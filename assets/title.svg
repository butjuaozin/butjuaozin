<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo -->
  <rect width="800" height="200" fill="#0f111a"/>

  <!-- Gradiente para o título -->
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5a0"/>
      <stop offset="100%" stop-color="#00bfff"/>
    </linearGradient>

    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Título -->
  <text x="50%" y="80" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="56" font-weight="bold" font-style="italic" fill="url(#titleGradient)" filter="url(#textShadow)">
    What’s Up? I'm João!
  </text>

  <!-- Subtítulo colado na linha -->
  <text x="50%" y="120" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="24" fill="#8fa2cc" font-style="italic">
    you can call me butjuaozin, nice to meet you
  </text>

  <!-- Áreas de interesse -->
  <text x="50%" y="170" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" fill="#ccc">
    Software Engineering • Cybersecurity • AI
  </text>
</svg>
