<svg width="100%" height="140" viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDAE"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" rx="10"/>

  <text x="50%" y="55%" text-anchor="middle" font-size="42" font-family="Segoe UI, sans-serif" fill="url(#text)" filter="url(#glow)">
    Hello! I'm João
  </text>

  <text x="50%" y="78%" text-anchor="middle" font-size="16" fill="#8b949e">
    Software Engineering • Cybersecurity • AI
  </text>
</svg>
